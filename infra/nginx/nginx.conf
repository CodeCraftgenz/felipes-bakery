# ╔══════════════════════════════════════════════════════════════╗
# ║  Nginx — Configuração de Produção                            ║
# ║  Felipe's Bakery                                             ║
# ╚══════════════════════════════════════════════════════════════╝
#
# Responsabilidades desta configuração:
#   1. Redirecionar HTTP → HTTPS
#   2. Fazer proxy reverso para o Next.js (porta 3000)
#   3. Servir arquivos estáticos diretamente (sem passar pelo Node)
#   4. Aplicar cabeçalhos de segurança (CSP, HSTS, etc.)
#   5. Configurar rate limiting para proteger rotas críticas
#   6. Comprimir respostas com gzip
#
# Pré-requisitos:
#   - Certbot instalado para gerenciar certificados Let's Encrypt
#   - sudo certbot --nginx -d felipesbakery.com.br -d www.felipesbakery.com.br

# ── Configuração Global ───────────────────────────────────────
user nginx;
worker_processes auto;        # Usa todos os núcleos disponíveis
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;    # Conexões simultâneas por worker
  use epoll;                  # Melhor performance no Linux
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Formato de Log ──────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  # ── Performance ─────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  types_hash_max_size 2048;
  server_tokens      off;     # Não expõe versão do Nginx nos cabeçalhos

  # ── Compressão Gzip ─────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

  # ── Rate Limiting ────────────────────────────────────────────
  # Protege contra ataques de força bruta e DDoS
  limit_req_zone $binary_remote_addr zone=geral:10m    rate=30r/s;   # Uso geral
  limit_req_zone $binary_remote_addr zone=auth:10m     rate=5r/m;    # Login (anti brute-force)
  limit_req_zone $binary_remote_addr zone=api:10m      rate=20r/s;   # API pública
  limit_req_zone $binary_remote_addr zone=webhook:10m  rate=10r/s;   # Webhooks Mercado Pago

  # ── Upstream: Next.js ────────────────────────────────────────
  upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 32;
  }

  # ── Servidor HTTP → Redireciona para HTTPS ────────────────────
  server {
    listen 80;
    listen [::]:80;
    server_name felipesbakery.com.br www.felipesbakery.com.br;

    # Rota para renovação automática do certificado Let's Encrypt
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redireciona todo tráfego HTTP para HTTPS
    location / {
      return 301 https://felipesbakery.com.br$request_uri;
    }
  }

  # ── Servidor WWW → Redireciona para domínio sem www ──────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.felipesbakery.com.br;

    ssl_certificate     /etc/letsencrypt/live/felipesbakery.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/felipesbakery.com.br/privkey.pem;

    return 301 https://felipesbakery.com.br$request_uri;
  }

  # ── Servidor Principal HTTPS ──────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name felipesbakery.com.br;

    # ── SSL / TLS ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/felipesbakery.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/felipesbakery.com.br/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Cabeçalhos de Segurança ────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"        always;
    add_header X-Frame-Options           "SAMEORIGIN"     always;
    add_header X-XSS-Protection          "1; mode=block"  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy
    # Ajuste 'script-src' e 'connect-src' conforme adicionar serviços externos
    add_header Content-Security-Policy
      "default-src 'self';
       script-src 'self' 'unsafe-inline' https://sdk.mercadopago.com;
       style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
       font-src 'self' https://fonts.gstatic.com;
       img-src 'self' data: blob: https://*.cloudflare.com https://lh3.googleusercontent.com https://images.pexels.com https://images.unsplash.com;
       connect-src 'self' https://api.mercadopago.com https://*.sentry.io;
       frame-src https://sdk.mercadopago.com;
       object-src 'none';
       base-uri 'self';
       form-action 'self';"
      always;

    # ── Arquivos Estáticos do Next.js ──────────────────────────
    # Nginx serve diretamente sem passar pelo Node — muito mais rápido!
    location /_next/static/ {
      alias /var/www/felipes-bakery/.next/static/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /images/ {
      alias /var/www/felipes-bakery/public/images/;
      expires 30d;
      add_header Cache-Control "public";
    }

    location /favicon.ico {
      alias /var/www/felipes-bakery/public/favicon.ico;
      expires 30d;
    }

    # ── Rotas com Rate Limiting ────────────────────────────────

    # Login de clientes e admins — limite rígido contra brute-force
    location ~ ^/api/auth/(signin|callback) {
      limit_req zone=auth burst=10 nodelay;
      limit_req_status 429;
      proxy_pass http://nextjs;
      include /etc/nginx/proxy_params;
    }

    # Webhooks do Mercado Pago
    location /api/webhook/ {
      limit_req zone=webhook burst=20 nodelay;
      proxy_pass http://nextjs;
      include /etc/nginx/proxy_params;
    }

    # API pública geral
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://nextjs;
      include /etc/nginx/proxy_params;
    }

    # ── Proxy Principal → Next.js ──────────────────────────────
    location / {
      limit_req zone=geral burst=60 nodelay;
      proxy_pass http://nextjs;
      include /etc/nginx/proxy_params;
    }
  }
}
