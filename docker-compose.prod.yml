services:
  mysql:
    image: mysql:8.0
    container_name: felipesbakery_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?obrigatorio}
      MYSQL_DATABASE: felipebakery
      MYSQL_USER: felipebakery
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?obrigatorio}
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ufelipebakery", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: felipesbakery_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    env_file: .env.production
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: felipebakery
      DB_PASSWORD: ${MYSQL_PASSWORD:?obrigatorio}
      DB_NAME: felipebakery
      # Diretório onde o endpoint /api/admin/upload grava as imagens
      # enviadas pelo admin. Mapeado abaixo como volume persistente.
      UPLOAD_DIR: /app/uploads
    volumes:
      # Persiste as imagens enviadas pelo painel entre rebuilds do container
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
  uploads_data:
