# ============================================================
# Nginx Config — Felipe's Bakery
# Arquivo: /etc/nginx/sites-available/felipesbakery
# Symlink: ln -s /etc/nginx/sites-available/felipesbakery /etc/nginx/sites-enabled/
# ============================================================

# Limite de requisições — previne brute force e DDoS básico
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=200r/m;

# Tamanho máximo de upload (para imagens de produto)
client_max_body_size 10M;

# ─── HTTP → HTTPS redirect ───────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name felipesbakery.com.br www.felipesbakery.com.br;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Principal ──────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name felipesbakery.com.br www.felipesbakery.com.br;

    # ── SSL (Let's Encrypt via Certbot) ─────────────────
    ssl_certificate     /etc/letsencrypt/live/felipesbakery.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/felipesbakery.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Headers de Segurança ─────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Content Security Policy
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://sdk.mercadopago.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob: https://cdn.felipesbakery.com.br https://*.r2.cloudflarestorage.com;
        connect-src 'self' https://api.mercadopago.com https://*.sentry.io;
        frame-src https://www.mercadopago.com.br;
        object-src 'none';
        base-uri 'self';
    " always;

    # ── Gzip / Compressão ────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript application/xml
        application/json application/rss+xml application/atom+xml
        image/svg+xml;
    gzip_disable "msie6";

    # ── Cache de Assets Estáticos ────────────────────────
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /images/ {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location /favicon.ico {
        proxy_pass http://localhost:3000;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ── Rate Limit em rotas sensíveis ────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout maior para webhooks do Mercado Pago
        proxy_read_timeout 60s;
    }

    # ── Proxy principal para Next.js ─────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Bloquear acesso direto ao /admin em IPs suspeitos ─
    # Descomente e configure se quiser restringir admin por IP
    # location /admin {
    #     allow 177.x.x.x;   # IP do escritório
    #     deny all;
    #     proxy_pass http://localhost:3000;
    # }

    # ── Logs ─────────────────────────────────────────────
    access_log /var/log/nginx/felipesbakery_access.log;
    error_log  /var/log/nginx/felipesbakery_error.log warn;
}
